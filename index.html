<!doctype html>
<html lang="pt" translate="no">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport: prevent zoom, respect safe areas (notch/bottom bar) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="google" content="notranslate" />

    <title>Complexo Desportivo Vila de Rei</title>
    <meta name="description" content="Acesso ao Complexo Desportivo Municipal de Vila de Rei" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Android Chrome theme -->
    <meta name="theme-color" content="#004D71" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS Safari (Add to Home Screen) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Vila de Rei" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />

    <!-- Prevent flash of unstyled content on dark bg -->
    <style>
      html, body, #root {
        margin: 0;
        padding: 0;
        background-color: #f8fafc;
        min-height: 100dvh;
        /* Safe area insets for notch + bottom bar */
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
      /* Prevent text selection app-wide */
      * { -webkit-tap-highlight-color: transparent; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
