name: Daily Firebase Backup

on:
  schedule:
    - cron: '0 3 * * *'  # 3 AM UTC daily
  workflow_dispatch:     # Manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Run Firebase backup
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
        run: |
          npm run firebase:local > /tmp/emulator.log 2>&1 &
          EMULATOR_PID=$!
          sleep 15
          npm run firebase:migrate || true
          kill -TERM $EMULATOR_PID 2>/dev/null || true
          sleep 5

      - name: Commit and push backup
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "Firebase Backup Bot"
          git config user.email "backup@github.com"
          git add local-data/ || true

          if git diff --cached --quiet; then
            echo "No changes to backup"
          else
            TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S')
            git commit -m "backup: $TIMESTAMP"
            git push origin main || echo "Push failed"
          fi
